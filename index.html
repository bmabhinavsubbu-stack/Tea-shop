<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Counter — Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --espresso:#1E140D;
    --roast:#332215;
    --roast-2:#42301F;
    --amber:#D9A441;
    --amber-dim:#B9862F;
    --rust:#A6501E;
    --paper:#F6EFDD;
    --paper-line:#DCD0AE;
    --ink:#2A1B12;
    --sage:#5B7F52;
    --sage-dim:#496B41;
    --cream-text:#F2E9D8;
    --muted:#C9B892;
    --radius:10px;
    --shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, #2A1B10 0%, transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, #2A1B10 0%, transparent 55%),
      var(--espresso);
    color:var(--cream-text);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3{ font-family:'Fraunces', serif; font-weight:600; margin:0; }
  button{ font-family:inherit; cursor:pointer; }
  .app{ max-width:1180px; margin:0 auto; padding:18px 20px 60px; }

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    flex-wrap:wrap;
    padding-bottom:16px; margin-bottom:18px;
    border-bottom:1px solid rgba(217,164,65,.25);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:46px; height:46px; border-radius:50%;
    background: conic-gradient(from 220deg, var(--amber), var(--rust), var(--amber));
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.25), var(--shadow);
  }
  .brand h1{ font-size:1.5rem; color:var(--amber); letter-spacing:.2px; }
  .brand .tagline{ margin:2px 0 0; font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .tabs{ display:flex; gap:6px; background:var(--roast); padding:5px; border-radius:999px; box-shadow: var(--shadow); }
  .tab{
    border:none; background:transparent; color:var(--muted);
    padding:9px 18px; border-radius:999px; font-size:.9rem; font-weight:600;
    transition: all .15s ease;
  }
  .tab:hover{ color:var(--cream-text); }
  .tab.active{ background:var(--amber); color:var(--espresso); }
  .clock{ font-family:'IBM Plex Mono', monospace; font-size:.85rem; color:var(--muted); text-align:right; min-width:150px; }
  .clock .date{ display:block; font-size:.75rem; color:var(--amber-dim); }

  .tab-panel{ display:none; animation: fadeIn .2s ease; }
  .tab-panel.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Billing layout ---------- */
  .billing-grid{ display:grid; grid-template-columns: 1.5fr 1fr; gap:22px; align-items:start; }
  @media (max-width: 860px){ .billing-grid{ grid-template-columns: 1fr; } }

  .panel-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .panel-title h2{ font-size:1.05rem; color:var(--amber); }
  .hint{ font-size:.78rem; color:var(--muted); }

  .menu-grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap:12px;
  }
  .menu-item-btn{
    background:var(--roast); border:1px solid var(--roast-2);
    border-radius:var(--radius); padding:16px 12px; text-align:left;
    color:var(--cream-text); transition: transform .1s ease, border-color .15s ease;
    position:relative; overflow:hidden;
  }
  .menu-item-btn:hover{ border-color:var(--amber); transform:translateY(-2px); }
  .menu-item-btn:active{ transform:translateY(0) scale(.98); }
  .menu-item-btn .mi-name{ display:block; font-weight:600; font-size:.95rem; margin-bottom:6px; }
  .menu-item-btn .mi-price{ font-family:'IBM Plex Mono', monospace; color:var(--amber); font-size:.9rem; }
  .empty-note{ color:var(--muted); font-size:.9rem; padding:20px 0; }

  /* ---------- Receipt ticket ---------- */
  .receipt-pane{ background:transparent; position:sticky; top:18px; }
  .receipt-wrap{ position:relative; padding:14px 0; }
  .receipt{
    background:var(--paper); color:var(--ink); border-radius:2px;
    padding:20px 18px 16px; font-family:'IBM Plex Mono', monospace;
    box-shadow: var(--shadow); position:relative;
  }
  .receipt::before, .receipt::after{
    content:""; position:absolute; left:0; right:0; height:12px;
    background-image: radial-gradient(circle at 10px 6px, var(--espresso) 6px, transparent 7px);
    background-size:20px 12px; background-repeat:repeat-x;
  }
  .receipt::before{ top:-6px; }
  .receipt::after{ bottom:-6px; transform:rotate(180deg); }
  .r-shop-name{ font-family:'Fraunces', serif; font-weight:700; font-size:1.15rem; text-align:center; }
  .r-line{ text-align:center; font-size:.72rem; color:#5a4a38; line-height:1.4; }
  .r-divider{ border:none; border-top:1px dashed var(--paper-line); margin:10px 0; }
  .r-meta{ display:flex; justify-content:space-between; font-size:.72rem; color:#5a4a38; margin-bottom:2px; }
  .r-items{ margin:8px 0; min-height:40px; }
  .r-item-row{ display:flex; justify-content:space-between; gap:8px; font-size:.83rem; padding:5px 0; }
  .r-item-row .qty-controls{ display:flex; align-items:center; gap:6px; }
  .r-item-row button{
    width:20px; height:20px; border-radius:4px; border:1px solid var(--paper-line);
    background:#fff; font-size:.8rem; line-height:1; color:var(--ink);
  }
  .r-item-row .rm-btn{ color:var(--rust); border:none; background:none; font-size:.85rem; }
  .r-item-name{ flex:1; }
  .r-item-amt{ font-weight:600; min-width:64px; text-align:right; }
  .r-empty{ text-align:center; color:#8a7a63; font-size:.82rem; padding:14px 0; }
  .r-total-row{ display:flex; justify-content:space-between; font-size:1.05rem; font-weight:700; margin-top:6px; }
  .r-footer{ text-align:center; font-size:.72rem; color:#5a4a38; margin-top:10px; }

  .bill-actions{ display:flex; gap:10px; margin-top:14px; }
  .btn{
    flex:1; border:none; border-radius:8px; padding:12px 14px; font-weight:600; font-size:.9rem;
    transition:filter .15s ease;
  }
  .btn:hover{ filter:brightness(1.08); }
  .btn-primary{ background:var(--sage); color:#fff; }
  .btn-secondary{ background:var(--roast); color:var(--cream-text); border:1px solid var(--roast-2); }
  .btn-danger{ background:var(--rust); color:#fff; }
  .btn-outline{ background:transparent; border:1px solid var(--amber-dim); color:var(--amber); }

  /* ---------- Cards / forms ---------- */
  .card{ background:var(--roast); border:1px solid var(--roast-2); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:640px){ .grid-2{ grid-template-columns:1fr; } }
  label{ display:block; font-size:.78rem; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.6px; }
  input[type=text], input[type=number], input[type=tel]{
    width:100%; padding:10px 12px; border-radius:7px; border:1px solid var(--roast-2);
    background:var(--espresso); color:var(--cream-text); font-size:.92rem; font-family:inherit;
  }
  input:focus{ outline:2px solid var(--amber); outline-offset:1px; }
  .field{ margin-bottom:14px; }
  .row{ display:flex; gap:10px; align-items:end; }
  .row .field{ flex:1; margin-bottom:0; }

  table{ width:100%; border-collapse:collapse; margin-top:6px; }
  th,td{ text-align:left; padding:10px 8px; font-size:.88rem; border-bottom:1px solid var(--roast-2); }
  th{ color:var(--muted); font-weight:600; font-size:.76rem; text-transform:uppercase; letter-spacing:.5px; }
  td.num{ font-family:'IBM Plex Mono', monospace; }
  .row-actions{ display:flex; gap:8px; }
  .icon-btn{ background:none; border:none; color:var(--muted); font-size:.95rem; padding:4px 6px; border-radius:5px; }
  .icon-btn:hover{ color:var(--amber); background:rgba(217,164,65,.12); }
  .icon-btn.del:hover{ color:#fff; background:var(--rust); }

  .section-title{ margin-bottom:14px; font-size:1.1rem; color:var(--amber); }
  .subtle{ color:var(--muted); font-size:.85rem; }

  .history-day{ margin-bottom:20px; }
  .history-day-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .history-day-head h3{ font-size:.95rem; color:var(--cream-text); }
  .history-day-head .tot{ font-family:'IBM Plex Mono', monospace; color:var(--amber); font-weight:600; }
  .bill-card{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--espresso); border:1px solid var(--roast-2); border-radius:8px;
    padding:10px 14px; margin-bottom:8px;
  }
  .bill-card .bno{ font-family:'IBM Plex Mono', monospace; color:var(--amber); font-size:.85rem; }
  .bill-card .time{ color:var(--muted); font-size:.78rem; margin-left:10px; }
  .bill-card .amt{ font-family:'IBM Plex Mono', monospace; font-weight:600; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--sage); color:#fff; padding:12px 22px; border-radius:8px;
    font-size:.9rem; font-weight:600; box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:999;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .top-actions{ display:flex; justify-content:flex-end; margin-bottom:10px; }

  /* ---------- Print ---------- */
  #printArea{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{ display:block; position:absolute; top:0; left:0; width:80mm; }
    @page{ size:80mm auto; margin:0; }
    .print-receipt{ font-family:'IBM Plex Mono', monospace; color:#000; padding:4mm; width:100%; }
    .print-receipt .p-shop{ font-family:'Fraunces', serif; font-size:14px; font-weight:700; text-align:center; }
    .print-receipt .p-line{ text-align:center; font-size:10px; line-height:1.4; }
    .print-receipt hr{ border:none; border-top:1px dashed #000; margin:6px 0; }
    .print-receipt .p-meta{ display:flex; justify-content:space-between; font-size:10px; }
    .print-receipt .p-item{ display:flex; justify-content:space-between; font-size:11px; padding:2px 0; }
    .print-receipt .p-total{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-top:4px; }
    .print-receipt .p-footer{ text-align:center; font-size:10px; margin-top:8px; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🍵</div>
      <div>
        <h1 id="shopNameDisplay">Tea Counter</h1>
        <p class="tagline">Billing</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="billing">Billing</button>
      <button class="tab" data-tab="menu">Menu</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
    <div class="clock">
      <span class="date" id="clockDate">—</span>
      <span id="clockTime">—</span>
    </div>
  </header>

  <main>

    <!-- BILLING TAB -->
    <section id="tab-billing" class="tab-panel active">
      <div class="billing-grid">
        <div>
          <div class="panel-title">
            <h2>Tap an item to add it to the bill</h2>
            <span class="hint" id="menuCount"></span>
          </div>
          <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div class="receipt-pane">
          <div class="receipt-wrap">
            <div class="receipt" id="receiptOnScreen">
              <div class="r-shop-name" id="rShopName">Tea Counter</div>
              <div class="r-line" id="rAddress"></div>
              <div class="r-line" id="rPhone"></div>
              <hr class="r-divider">
              <div class="r-meta"><span id="rBillNo">Bill #—</span><span id="rDate">—</span></div>
              <hr class="r-divider">
              <div class="r-items" id="rItems">
                <div class="r-empty">No items added yet</div>
              </div>
              <hr class="r-divider">
              <div class="r-total-row"><span>TOTAL</span><span id="rTotal">₹0</span></div>
              <div class="r-footer" id="rFooter"></div>
            </div>
          </div>
          <div class="bill-actions">
            <button class="btn btn-secondary" id="clearCartBtn">Clear</button>
            <button class="btn btn-primary" id="savePrintBtn">Save &amp; Print</button>
          </div>
        </div>
      </div>
    </section>

    <!-- MENU TAB -->
    <section id="tab-menu" class="tab-panel">
      <div class="card" style="margin-bottom:18px;">
        <h2 class="section-title">Add a new item</h2>
        <div class="row">
          <div class="field">
            <label for="newItemName">Item name</label>
            <input type="text" id="newItemName" placeholder="e.g. Masala Chai">
          </div>
          <div class="field" style="max-width:160px;">
            <label for="newItemPrice">Price</label>
            <input type="number" id="newItemPrice" placeholder="0" min="0" step="1">
          </div>
          <button class="btn btn-primary" style="flex:0 0 auto; padding:10px 20px;" id="addItemBtn">Add item</button>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Current menu</h2>
        <table>
          <thead><tr><th>Item</th><th>Price</th><th></th></tr></thead>
          <tbody id="menuTableBody"></tbody>
        </table>
        <p class="subtle" id="menuEmptyNote" style="display:none;">No menu items yet — add your first one above.</p>
      </div>
    </section>

    <!-- HISTORY TAB -->
    <section id="tab-history" class="tab-panel">
      <div class="top-actions">
        <button class="btn btn-danger" style="flex:0 0 auto; padding:9px 18px;" id="clearHistoryBtn">Clear all history</button>
      </div>
      <div id="historyContent"></div>
    </section>

    <!-- SETTINGS TAB -->
    <section id="tab-settings" class="tab-panel">
      <div class="card" style="max-width:560px;">
        <h2 class="section-title">Shop details</h2>
        <p class="subtle" style="margin-top:-8px; margin-bottom:16px;">These details appear on every printed bill.</p>
        <div class="field">
          <label for="setShopName">Shop name</label>
          <input type="text" id="setShopName" placeholder="Tea Counter">
        </div>
        <div class="field">
          <label for="setAddress">Address (optional)</label>
          <input type="text" id="setAddress" placeholder="Shop address">
        </div>
        <div class="field">
          <label for="setPhone">Phone (optional)</label>
          <input type="text" id="setPhone" placeholder="Phone number">
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="setCurrency">Currency symbol</label>
            <input type="text" id="setCurrency" placeholder="₹">
          </div>
          <div class="field">
            <label for="setFooter">Receipt footer note</label>
            <input type="text" id="setFooter" placeholder="Thank you, visit again!">
          </div>
        </div>
        <button class="btn btn-primary" style="flex:0 0 auto; padding:10px 22px;" id="saveSettingsBtn">Save settings</button>
      </div>
    </section>

  </main>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- Storage helpers ---------------- */
  var KEYS = { menu:'tsb_menu', settings:'tsb_settings', history:'tsb_history', counter:'tsb_billCounter' };

  function load(key, fallback){
    try{
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function save(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
  }

  var DEFAULT_MENU = [
    {id:'m1', name:'Masala Chai', price:15},
    {id:'m2', name:'Plain Tea', price:10},
    {id:'m3', name:'Ginger Tea', price:15},
    {id:'m4', name:'Green Tea', price:20},
    {id:'m5', name:'Lemon Tea', price:15},
    {id:'m6', name:'Coffee', price:15},
    {id:'m7', name:'Bun Maska', price:25},
    {id:'m8', name:'Samosa', price:15},
    {id:'m9', name:'Vada', price:10},
    {id:'m10', name:'Biscuit', price:5}
  ];
  var DEFAULT_SETTINGS = { shopName:'Tea Counter', address:'', phone:'', currency:'₹', footer:'Thank you, visit again!' };

  var state = {
    menu: load(KEYS.menu, DEFAULT_MENU),
    settings: load(KEYS.settings, DEFAULT_SETTINGS),
    history: load(KEYS.history, []),
    counter: load(KEYS.counter, 0),
    cart: []
  };
  if(!localStorage.getItem(KEYS.menu)) save(KEYS.menu, state.menu);
  if(!localStorage.getItem(KEYS.settings)) save(KEYS.settings, state.settings);

  /* ---------------- Utilities ---------------- */
  function uid(){ return 'i' + Math.random().toString(36).slice(2,9); }
  function fmt(n){ return state.settings.currency + Number(n||0).toLocaleString('en-IN'); }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function cartTotal(){
    return state.cart.reduce(function(sum, it){ return sum + it.price * it.qty; }, 0);
  }

  /* ---------------- Tabs ---------------- */
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab === 'menu') renderMenuManager();
      if(btn.dataset.tab === 'history') renderHistory();
      if(btn.dataset.tab === 'settings') fillSettingsForm();
    });
  });

  /* ---------------- Clock ---------------- */
  function updateClock(){
    var now = new Date();
    document.getElementById('clockDate').textContent = now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
    document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  }
  updateClock();
  setInterval(updateClock, 15000);

  /* ---------------- Menu grid (billing tab) ---------------- */
  function renderMenuGrid(){
    var grid = document.getElementById('menuGrid');
    var countEl = document.getElementById('menuCount');
    if(state.menu.length === 0){
      grid.innerHTML = '<p class="empty-note">No menu items yet. Go to the <strong>Menu</strong> tab to add your first item.</p>';
      countEl.textContent = '';
      return;
    }
    countEl.textContent = state.menu.length + ' items';
    grid.innerHTML = state.menu.map(function(item){
      return '<button class="menu-item-btn" data-id="' + item.id + '">' +
        '<span class="mi-name">' + escapeHtml(item.name) + '</span>' +
        '<span class="mi-price">' + fmt(item.price) + '</span>' +
        '</button>';
    }).join('');
    grid.querySelectorAll('.menu-item-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ addToCart(btn.dataset.id); });
    });
  }

  function addToCart(itemId){
    var menuItem = state.menu.find(function(m){ return m.id === itemId; });
    if(!menuItem) return;
    var line = state.cart.find(function(c){ return c.id === itemId; });
    if(line){ line.qty += 1; }
    else{ state.cart.push({ id: menuItem.id, name: menuItem.name, price: menuItem.price, qty: 1 }); }
    renderReceipt();
  }
  function changeQty(itemId, delta){
    var line = state.cart.find(function(c){ return c.id === itemId; });
    if(!line) return;
    line.qty += delta;
    if(line.qty <= 0){ state.cart = state.cart.filter(function(c){ return c.id !== itemId; }); }
    renderReceipt();
  }
  function removeFromCart(itemId){
    state.cart = state.cart.filter(function(c){ return c.id !== itemId; });
    renderReceipt();
  }

  /* ---------------- Receipt (on-screen) ---------------- */
  function fillReceiptHeader(){
    document.getElementById('shopNameDisplay').textContent = state.settings.shopName || 'Tea Counter';
    document.getElementById('rShopName').textContent = state.settings.shopName || 'Tea Counter';
    document.getElementById('rAddress').textContent = state.settings.address || '';
    document.getElementById('rAddress').style.display = state.settings.address ? 'block' : 'none';
    document.getElementById('rPhone').textContent = state.settings.phone ? ('Ph: ' + state.settings.phone) : '';
    document.getElementById('rPhone').style.display = state.settings.phone ? 'block' : 'none';
    document.getElementById('rFooter').textContent = state.settings.footer || '';
    document.getElementById('rBillNo').textContent = 'Bill #' + (state.counter + 1);
    document.getElementById('rDate').textContent = new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short'}) + ' ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  }

  function renderReceipt(){
    fillReceiptHeader();
    var itemsEl = document.getElementById('rItems');
    if(state.cart.length === 0){
      itemsEl.innerHTML = '<div class="r-empty">No items added yet</div>';
    }else{
      itemsEl.innerHTML = state.cart.map(function(it){
        return '<div class="r-item-row">' +
          '<span class="r-item-name">' + escapeHtml(it.name) + '</span>' +
          '<span class="qty-controls">' +
            '<button data-act="dec" data-id="' + it.id + '">−</button>' +
            '<span>' + it.qty + '</span>' +
            '<button data-act="inc" data-id="' + it.id + '">+</button>' +
          '</span>' +
          '<span class="r-item-amt">' + fmt(it.price * it.qty) + '</span>' +
          '<button class="rm-btn" data-act="rm" data-id="' + it.id + '" title="Remove">✕</button>' +
        '</div>';
      }).join('');
      itemsEl.querySelectorAll('button').forEach(function(btn){
        btn.addEventListener('click', function(){
          var id = btn.dataset.id, act = btn.dataset.act;
          if(act === 'inc') changeQty(id, 1);
          else if(act === 'dec') changeQty(id, -1);
          else if(act === 'rm') removeFromCart(id);
        });
      });
    }
    document.getElementById('rTotal').textContent = fmt(cartTotal());
  }

  document.getElementById('clearCartBtn').addEventListener('click', function(){
    if(state.cart.length === 0) return;
    if(confirm('Clear the current bill?')){
      state.cart = [];
      renderReceipt();
    }
  });

  document.getElementById('savePrintBtn').addEventListener('click', function(){
    if(state.cart.length === 0){
      showToast('Add at least one item first');
      return;
    }
    state.counter += 1;
    save(KEYS.counter, state.counter);
    var bill = {
      billNo: state.counter,
      dateISO: new Date().toISOString(),
      items: state.cart.map(function(c){ return { name:c.name, price:c.price, qty:c.qty }; }),
      total: cartTotal()
    };
    state.history.unshift(bill);
    save(KEYS.history, state.history);
    buildPrintArea(bill);
    window.print();
    state.cart = [];
    renderReceipt();
    showToast('Bill #' + bill.billNo + ' saved');
  });

  function buildPrintArea(bill){
    var s = state.settings;
    var html = '<div class="print-receipt">' +
      '<div class="p-shop">' + escapeHtml(s.shopName || 'Tea Counter') + '</div>' +
      (s.address ? '<div class="p-line">' + escapeHtml(s.address) + '</div>' : '') +
      (s.phone ? '<div class="p-line">Ph: ' + escapeHtml(s.phone) + '</div>' : '') +
      '<hr>' +
      '<div class="p-meta"><span>Bill #' + bill.billNo + '</span><span>' + new Date(bill.dateISO).toLocaleString('en-IN') + '</span></div>' +
      '<hr>' +
      bill.items.map(function(it){
        return '<div class="p-item"><span>' + escapeHtml(it.name) + ' x' + it.qty + '</span><span>' + fmt(it.price * it.qty) + '</span></div>';
      }).join('') +
      '<hr>' +
      '<div class="p-total"><span>TOTAL</span><span>' + fmt(bill.total) + '</span></div>' +
      (s.footer ? '<div class="p-footer">' + escapeHtml(s.footer) + '</div>' : '') +
      '</div>';
    document.getElementById('printArea').innerHTML = html;
  }

  /* ---------------- Menu manager (menu tab) ---------------- */
  function renderMenuManager(){
    var body = document.getElementById('menuTableBody');
    var emptyNote = document.getElementById('menuEmptyNote');
    if(state.menu.length === 0){
      body.innerHTML = '';
      emptyNote.style.display = 'block';
      return;
    }
    emptyNote.style.display = 'none';
    body.innerHTML = state.menu.map(function(item){
      return '<tr data-id="' + item.id + '">' +
        '<td class="mname">' + escapeHtml(item.name) + '</td>' +
        '<td class="num mprice">' + fmt(item.price) + '</td>' +
        '<td class="row-actions">' +
          '<button class="icon-btn edit-btn" title="Edit">✎ Edit</button>' +
          '<button class="icon-btn del del-btn" title="Delete">🗑 Delete</button>' +
        '</td></tr>';
    }).join('');

    body.querySelectorAll('.edit-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var tr = btn.closest('tr');
        var id = tr.dataset.id;
        var item = state.menu.find(function(m){ return m.id === id; });
        var newName = prompt('Item name', item.name);
        if(newName === null) return;
        var newPrice = prompt('Price', item.price);
        if(newPrice === null) return;
        newName = newName.trim();
        newPrice = parseFloat(newPrice);
        if(!newName || isNaN(newPrice) || newPrice < 0){
          showToast('Please enter a valid name and price');
          return;
        }
        item.name = newName;
        item.price = newPrice;
        save(KEYS.menu, state.menu);
        renderMenuManager();
        renderMenuGrid();
        showToast('Item updated');
      });
    });
    body.querySelectorAll('.del-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var tr = btn.closest('tr');
        var id = tr.dataset.id;
        var item = state.menu.find(function(m){ return m.id === id; });
        if(confirm('Delete "' + item.name + '" from the menu?')){
          state.menu = state.menu.filter(function(m){ return m.id !== id; });
          save(KEYS.menu, state.menu);
          renderMenuManager();
          renderMenuGrid();
          showToast('Item deleted');
        }
      });
    });
  }

  document.getElementById('addItemBtn').addEventListener('click', function(){
    var nameInput = document.getElementById('newItemName');
    var priceInput = document.getElementById('newItemPrice');
    var name = nameInput.value.trim();
    var price = parseFloat(priceInput.value);
    if(!name){ showToast('Enter an item name'); nameInput.focus(); return; }
    if(isNaN(price) || price < 0){ showToast('Enter a valid price'); priceInput.focus(); return; }
    state.menu.push({ id: uid(), name: name, price: price });
    save(KEYS.menu, state.menu);
    nameInput.value = ''; priceInput.value = '';
    nameInput.focus();
    renderMenuManager();
    renderMenuGrid();
    showToast('Item added');
  });

  /* ---------------- History tab ---------------- */
  function renderHistory(){
    var container = document.getElementById('historyContent');
    if(state.history.length === 0){
      container.innerHTML = '<p class="subtle">No bills saved yet. Bills you print from the Billing tab will show up here.</p>';
      return;
    }
    var groups = {};
    var order = [];
    state.history.forEach(function(bill){
      var d = new Date(bill.dateISO);
      var key = d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
      if(!groups[key]){ groups[key] = []; order.push(key); }
      groups[key].push(bill);
    });
    container.innerHTML = order.map(function(dayKey){
      var bills = groups[dayKey];
      var dayTotal = bills.reduce(function(s,b){ return s + b.total; }, 0);
      var billsHtml = bills.map(function(b){
        var time = new Date(b.dateISO).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
        return '<div class="bill-card">' +
          '<div><span class="bno">Bill #' + b.billNo + '</span><span class="time">' + time + ' · ' + b.items.length + ' item(s)</span></div>' +
          '<div style="display:flex; align-items:center; gap:14px;">' +
            '<span class="amt">' + fmt(b.total) + '</span>' +
            '<button class="icon-btn reprint-btn" data-billno="' + b.billNo + '">🖨 Reprint</button>' +
          '</div></div>';
      }).join('');
      return '<div class="history-day">' +
        '<div class="history-day-head"><h3>' + dayKey + '</h3><span class="tot">Day total: ' + fmt(dayTotal) + '</span></div>' +
        billsHtml + '</div>';
    }).join('');

    container.querySelectorAll('.reprint-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var billNo = parseInt(btn.dataset.billno, 10);
        var bill = state.history.find(function(b){ return b.billNo === billNo; });
        if(!bill) return;
        buildPrintArea(bill);
        window.print();
      });
    });
  }

  document.getElementById('clearHistoryBtn').addEventListener('click', function(){
    if(state.history.length === 0) return;
    if(confirm('This will permanently delete all saved bill history. Continue?')){
      state.history = [];
      save(KEYS.history, state.history);
      renderHistory();
      showToast('History cleared');
    }
  });

  /* ---------------- Settings tab ---------------- */
  function fillSettingsForm(){
    document.getElementById('setShopName').value = state.settings.shopName || '';
    document.getElementById('setAddress').value = state.settings.address || '';
    document.getElementById('setPhone').value = state.settings.phone || '';
    document.getElementById('setCurrency').value = state.settings.currency || '₹';
    document.getElementById('setFooter').value = state.settings.footer || '';
  }
  document.getElementById('saveSettingsBtn').addEventListener('click', function(){
    state.settings = {
      shopName: document.getElementById('setShopName').value.trim() || 'Tea Counter',
      address: document.getElementById('setAddress').value.trim(),
      phone: document.getElementById('setPhone').value.trim(),
      currency: document.getElementById('setCurrency').value.trim() || '₹',
      footer: document.getElementById('setFooter').value.trim()
    };
    save(KEYS.settings, state.settings);
    fillReceiptHeader();
    renderMenuGrid();
    renderReceipt();
    showToast('Settings saved');
  });

  /* ---------------- Init ---------------- */
  fillReceiptHeader();
  renderMenuGrid();
  renderReceipt();

})();
</script>
</body>
</html>
